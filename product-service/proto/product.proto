syntax = "proto3";

package product;

option go_package = "sneaker-store/product-service/proto;productpb";

service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (ProductResponse);
  rpc GetProduct(GetProductRequest) returns (ProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (ProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
  rpc SearchProducts(SearchProductsRequest) returns (ListProductsResponse);
  rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse);
  rpc GetProductsByBrand(GetProductsByBrandRequest) returns (ListProductsResponse);
  rpc GetLowStockProducts(GetLowStockRequest) returns (ListProductsResponse);
  rpc GetBrands(GetBrandsRequest) returns (GetBrandsResponse);
  rpc GetProductStats(GetProductStatsRequest) returns (GetProductStatsResponse);
  rpc BulkDeleteProducts(BulkDeleteProductsRequest) returns (BulkDeleteProductsResponse);
}

message CreateProductRequest {
  string name          = 1;
  string brand         = 2;
  string description   = 3;
  double price         = 4;
  repeated string sizes = 5;
  int32  stock         = 6;
  string image_url     = 7;
}

message GetProductRequest {
  string id = 1;
}

message ListProductsRequest {}

message UpdateProductRequest {
  string id            = 1;
  string name          = 2;
  string brand         = 3;
  string description   = 4;
  double price         = 5;
  repeated string sizes = 6;
  int32  stock         = 7;
  string image_url     = 8;
}

message DeleteProductRequest {
  string id = 1;
}

message SearchProductsRequest {
  string brand     = 1;
  double min_price = 2;
  double max_price = 3;
  string size      = 4;
}

message UpdateStockRequest {
  string id    = 1;
  int32  delta = 2;
}

message GetProductsByBrandRequest {
  string brand = 1;
}

message GetLowStockRequest {
  int32 threshold = 1;
}

message GetBrandsRequest {}

message GetProductStatsRequest {}

message BulkDeleteProductsRequest {
  repeated string ids = 1;
}

message ProductResponse {
  string id            = 1;
  string name          = 2;
  string brand         = 3;
  string description   = 4;
  double price         = 5;
  repeated string sizes = 6;
  int32  stock         = 7;
  string image_url     = 8;
  string created_at    = 9;
  string updated_at    = 10;
}

message DeleteProductResponse {
  bool success = 1;
}

message ListProductsResponse {
  repeated ProductResponse products = 1;
}

message UpdateStockResponse {
  string id        = 1;
  int32  new_stock = 2;
}

message GetBrandsResponse {
  repeated string brands = 1;
}

message GetProductStatsResponse {
  int32  total_products = 1;
  int32  total_brands   = 2;
  int32  total_stock    = 3;
  double average_price  = 4;
}

message BulkDeleteProductsResponse {
  int32 deleted_count = 1;
}
