syntax = "proto3";

package user;

option go_package = "sneaker-store/user-service/proto;userpb";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc AuthenticateUser(AuthenticateRequest) returns (AuthenticateResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (UserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc SearchUsers(SearchUsersRequest) returns (ListUsersResponse);
  rpc GetUserStats(GetUserStatsRequest) returns (GetUserStatsResponse);
  rpc UpdateUserStatus(UpdateUserStatusRequest) returns (UserResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
}

message CreateUserRequest {
  string email     = 1;
  string password  = 2;
  string full_name = 3;
  string phone     = 4;
  string role      = 5;
}

message GetUserRequest {
  string id = 1;
}

message UpdateUserRequest {
  string id        = 1;
  string full_name = 2;
  string phone     = 3;
}

message DeleteUserRequest {
  string id = 1;
}

message AuthenticateRequest {
  string email    = 1;
  string password = 2;
}

message GetUserByEmailRequest {
  string email = 1;
}

message ChangePasswordRequest {
  string id           = 1;
  string old_password = 2;
  string new_password = 3;
}

message ListUsersRequest {
  int32 page  = 1;
  int32 limit = 2;
}

message SearchUsersRequest {
  string query = 1;
}

message GetUserStatsRequest {}

message UpdateUserStatusRequest {
  string id     = 1;
  bool   active = 2;
}

message ResetPasswordRequest {
  string id           = 1;
  string new_password = 2;
}

message UserResponse {
  string id         = 1;
  string email      = 2;
  string full_name  = 3;
  string phone      = 4;
  bool   active     = 5;
  string created_at = 6;
  string updated_at = 7;
  string role       = 8;
}

message DeleteUserResponse {
  bool success = 1;
}

message AuthenticateResponse {
  bool   success = 1;
  string user_id = 2;
  string message = 3;
  string role    = 4;
}

message ChangePasswordResponse {
  bool success = 1;
}

message ListUsersResponse {
  repeated UserResponse users = 1;
  int32                 total = 2;
}

message GetUserStatsResponse {
  int32 total_users  = 1;
  int32 active_users = 2;
}

message ResetPasswordResponse {
  bool success = 1;
}
